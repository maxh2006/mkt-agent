# Nginx reverse proxy config for MKT Agent
#
# Deploy to server:
#   sudo cp /opt/mkt-agent/nginx/mkt-agent.conf /etc/nginx/sites-available/mkt-agent
#   sudo ln -s /etc/nginx/sites-available/mkt-agent /etc/nginx/sites-enabled/mkt-agent
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace dev.yourdomain.com with your actual subdomain.
#
# Cloudflare SSL/TLS mode: Flexible
#   → Cloudflare terminates HTTPS from the visitor.
#   → Cloudflare talks to this Nginx over plain HTTP (port 80).
#   → No SSL cert needed on the VPS.
#   → X-Forwarded-Proto: https is set by Cloudflare; proxy.ts uses it correctly.

server {
    listen 80;
    server_name dev.yourdomain.com;

    # Recommended: only allow Cloudflare IPs if you want to lock down direct access.
    # See https://www.cloudflare.com/ips/ — add allow/deny rules here if needed.

    # Increase body size for any future file uploads
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;

        # WebSocket support (Next.js HMR — not needed in prod, but harmless)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Pass correct host and IP headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cloudflare sets this to "https" — tells Next.js the original scheme
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_cache_bypass $http_upgrade;

        # Timeout for slow API responses (Prisma queries, AI calls, etc.)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
}
